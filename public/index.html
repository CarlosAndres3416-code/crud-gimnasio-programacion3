<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <form id="formulario-gimnasio">
        <input type="hidden" id="inscripcion-id">

        <label for="nombre_cliente">Nombre Completo del Atleta:</label>
        <input type="text" id="nombre_cliente" required placeholder="Ej. Juan Pérez">

        <label for="plan_gimnasio">Plan Seleccionado:</label>
        <select id="plan_gimnasio" required>
            <option value="">-- Selecciona un plan --</option>
            <option value="Diario">Diario</option>
            <option value="Mensualidad Estándar">Mensualidad Estándar</option>
            <option value="Plan VIP (Trimestral)">Plan VIP (Trimestral)</option>
        </select>

        <label for="monto_pago">Monto Abonado ($):</label>
        <input type="number" id="monto_pago" step="0.01" required placeholder="0.00">

        <label for="estado">Estado de Membresía:</label>
        <select id="estado">
            <option value="Activo">Activo (Acceso Permitido)</option>
            <option value="Inactivo">Inactivo (Acceso Bloqueado)</option>
        </select>

        <button type="submit" id="btn-registrar">Registrar Entrada/Plan</button>
    </form>

    <hr>

    <h2>Atletas Inscritos</h2>
    <div id="contenedor-tarjetas">
        </div>

    <script src="js/main.js"></script>
</body>
</html>
